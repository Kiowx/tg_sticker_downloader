  async fetch(req) {
    const cors = {
      "Access-Control-Allow-Origin": "*",
      "Access-Control-Allow-Methods": "GET,POST,OPTIONS",
      "Access-Control-Allow-Headers": "*"
    };
    if (req.method === "OPTIONS") {
      return new Response(null, { headers: cors });
    }
    const url = new URL(req.url);
    if (url.pathname === "/health") {
      return Response.json({ status: "ok" }, { headers: cors });

    const tg = "https://api.telegram.org" + url.pathname + url.search;

function apiU(m){return gP()+'/bot'+gT()+m}

async function apiF(url,signal){
  for(let i=0;i<3;i++){
    try{
      if(signal?.aborted)throw new DOMException('','AbortError');
      const r=await fetch(url,signal?{signal}:{});
      if(r.status===429){await sleep(Math.max(+(r.headers.get('Retry-After')||2),2)*1000);continue}
      return r;
    }catch(e){
      if(e.name==='AbortError')throw e;
      if(i===2)throw e;
      await sleep(1000*(i+1));
    }
  }
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function toast(m,t='info'){const e=document.getElementById('toast');e.className='t show '+t;e.innerHTML=m}
function noToast(){document.getElementById('toast').className='t'}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function parseStickerInput(s){
  s=s.trim();
  if(!s)return null;
  let m=s.match(/^(?:https?:\/\/)?(?:www\.)?(?:t\.me|telegram\.me|telegram\.dog)\/(addstickers|addemoji)\/([A-Za-z0-9_]+)(?:[/?#].*)?$/i);
  if(m)return{name:m[2],route:m[1].toLowerCase(),source:'url'};
  try{
    if(/^tg:\/\//i.test(s)){
      const u=new URL(s),dm=(u.searchParams.get('domain')||'').toLowerCase(),nm=u.searchParams.get('set')||u.searchParams.get('start')||'';
      if((dm==='addstickers'||dm==='addemoji')&&/^[A-Za-z0-9_]+$/.test(nm))return{name:nm,route:dm,source:'deeplink'};
    }
  }catch{}
  if(/^[A-Za-z0-9_]+$/.test(s))return{name:s,route:'',source:'name'};
  return null;
}
function parseName(s){return parseStickerInput(s)?.name||null}
function routeText(r){return r==='addemoji'?'自定义表情包':'贴纸包（含普通与遮罩）'}

function routeBySet(set){return set?.sticker_type==='custom_emoji'?'addemoji':'addstickers'}
function normalizeStickerLink(name,route){return 'https://t.me/'+(route||'addstickers')+'/'+name}

    <div class="mn"><h3>最快做法：Cloudflare Workers</h3><ol><li>登录 Cloudflare 后进入 <span class="cm">Workers & Pages</span>，新建一个 Worker。</li><li>把默认示例代码替换成下方脚本并部署。</li><li>部署完成后会得到一个形如 <span class="cm">https://你的名字.workers.dev</span> 的地址，把它填到高级配置里的 <span class="cm">CORS 代理 URL</span>。</li><li>回到本页点击 <span class="cm">测试连接</span>，先看代理健康检查，再看 Token 是否可用。</li></ol></div>
    <div class="mn"><h3>代理最少要支持的三个能力</h3><ul><li><span class="cm">/health</span> 返回 <span class="cm">{"status":"ok"}</span></li><li><span class="cm">/bot&lt;token&gt;/...</span> 能转发 Telegram Bot API 请求</li><li><span class="cm">/file/bot&lt;token&gt;/...</span> 能转发文件下载请求</li></ul></div>

    body:`<div class="mn"><h3>怎么拿到贴纸包链接</h3><ol><li>在 Telegram 里打开任意贴纸或表情，点进它所属的贴纸包。</li><li>进入贴纸包详情后，使用 <span class="cm">分享</span> 或 <span class="cm">复制链接</span>。</li><li>复制到的常见格式通常是 <span class="cm">https://t.me/addstickers/包名</span>；自定义表情包常见格式是 <span class="cm">https://t.me/addemoji/包名</span>。</li><li>如果你只拿到了包名，例如 <span class="cm">FunnyDogs</span>，这里也可以直接识别。</li></ol></div>
    <div class="mn"><h3>复制不到完整链接时</h3><p>你可以先打开贴纸包详情页，记下链接最后一段包名；本页支持直接输入包名，并在下方帮你补全为标准链接。</p></div>

    <div class="ck"><label class="fl">贴纸链接 / 包名交叉验证</label><input type="text" id="inpStickerVerify" placeholder="粘贴贴纸链接、tg:// 链接或直接输入包名" autocomplete="off" onkeydown="if(event.key==='Enter'){event.preventDefault();crossCheckStickerLink()}"><div class="cl"><button class="b bg bs" id="btnStickerCheck" onclick="crossCheckStickerLink()">验证</button><button class="b bo bs" onclick="fillStickerVerifyFromMain()">读取主输入框</button></div><div class="cr" id="stickerCheck"><div class="csx">这里会先做本地结构校验，再调用当前配置的 Telegram 接口做远程存在性与类型校验。</div></div></div>`

async function crossCheckStickerLink(){
  const input=document.getElementById('inpStickerVerify'),out=document.getElementById('stickerCheck'),btn=document.getElementById('btnStickerCheck');
  if(!input||!out)return;
  const raw=input.value.trim(),p=parseStickerInput(raw);
  checkedStickerLink='';
  if(!raw){out.innerHTML='<div class="csx warn">请先粘贴贴纸链接或输入包名。</div>';return}
  if(!p){out.innerHTML='<div class="csx error">本地格式校验未通过。请检查是否为 <span class="cm">t.me/addstickers/包名</span>、<span class="cm">t.me/addemoji/包名</span>、<span class="cm">tg://...</span>，或者直接输入包名。</div>';return}
  const localLink=normalizeStickerLink(p.name,p.route||'addstickers');
  out.innerHTML=`<div class="csx ok">本地结构校验通过：识别到包名 <span class="cm">${esc(p.name)}</span>${p.route?`，链接类型为 <span class="cm">${esc(p.route)}</span>（${routeText(p.route)}）`:'，当前是“仅包名”输入，下一步会帮你补全标准链接'}。</div><div class="csx">远程校验中：正在通过当前代理和 Token 调用 <span class="cm">getStickerSet</span> 做存在性与类型校验...</div>`;
  if(btn)btn.disabled=true;
  try{
    const r=await apiF(apiU('/getStickerSet?name='+encodeURIComponent(p.name)));
    const d=await r.json();
    if(!d.ok)throw Error(d.description||'未知错误');
    const set=d.result,actualRoute=routeBySet(set),actualLink=normalizeStickerLink(set.name||p.name,actualRoute),routeMatch=!p.route||p.route===actualRoute;
    checkedStickerLink=actualLink;
    out.innerHTML=`<div class="csx ok">本地结构校验通过：识别到包名 <span class="cm">${esc(p.name)}</span>${p.route?`，输入类型为 <span class="cm">${esc(p.route)}</span>`:'，输入为包名模式'}。</div><div class="csx ${routeMatch?'ok':'warn'}">远程校验通过：已查询到 <span class="cm">${esc(set.title||set.name||p.name)}</span>，共 ${set.stickers?.length||0} 个，实际类型为 ${stickerTypeText(set.sticker_type)}。${routeMatch?'你输入的链接类型与真实包类型一致。':'你输入的链接类型与真实包类型不一致，下面给出修正后的标准链接。'}</div><div class="csx">推荐标准链接：<span class="cm">${esc(actualLink)}</span></div><div class="cl"><button class="b bg bs" onclick="applyCheckedStickerLink(false)">填入主输入框</button><button class="b bo bs" onclick="applyCheckedStickerLink(true)">填入并立即获取</button></div>`;
  }catch(e){
    checkedStickerLink=localLink;
    out.innerHTML=`<div class="csx ok">本地结构校验通过：已提取到包名 <span class="cm">${esc(p.name)}</span>，可先用结构化链接继续尝试。</div><div class="csx warn">远程校验失败：${esc(e.message)}。这通常表示贴纸包不存在，或者当前代理 / Token 暂时不可用。你仍然可以先使用下面的标准链接，再手动点击获取。</div><div class="csx">临时补全链接：<span class="cm">${esc(localLink)}</span></div><div class="cl"><button class="b bg bs" onclick="applyCheckedStickerLink(false)">填入主输入框</button></div>`;
  }finally{if(btn)btn.disabled=false}
}

async function doFetch(){
  const n=parseName(document.getElementById('inpLink').value);
  if(!n)return toast('请输入有效链接或包名','error');
  document.getElementById('btnFetch').disabled=true;
  toast('正在获取…','info');
  try{
    const r=await apiF(apiU('/getStickerSet?name='+encodeURIComponent(n)));
    const d=await r.json();
    if(!d.ok)throw Error(d.description||'未知错误');
    pack=d.result;selected=new Set(pack.stickers.map((_,i)=>i));pathCache={};
    renderPk();loadTh();noToast();
  }catch(e){toast('获取失败：'+e.message,'error')}
  finally{document.getElementById('btnFetch').disabled=false}
}

function badge(i,cls,txt){const e=document.getElementById('cs'+i);if(!e)return;e.className='ce-s';e.textContent='';if(!cls)return;e.classList.add(cls);e.textContent=txt||''}

/* ===== THUMBS ===== */
async function loadTh(){
  for(let i=0;i<pack.stickers.length;i++){
    const s=pack.stickers[i];
    try{
      const fid=s.thumbnail?.file_id||s.file_id;
      let fp=pathCache[fid];
      if(!fp){const d=await(await apiF(apiU('/getFile?file_id='+fid))).json();if(!d.ok)continue;fp=d.result.file_path;pathCache[fid]=fp}
      const url=fileU(fp),ph=document.getElementById('lp'+i);if(!ph)continue;
      const sty='max-width:82%;max-height:66%;object-fit:contain;border-radius:4px';
      if(fp.endsWith('.webm')){
        const v=document.createElement('video');Object.assign(v,{src:url,autoplay:true,loop:true,muted:true,playsInline:true});v.setAttribute('playsinline','');v.style.cssText=sty;ph.replaceWith(v);
      }else if(fp.endsWith('.tgs')){
        try{const blob=await(await fetch(url)).blob();const raw=await gz(new Uint8Array(await blob.arrayBuffer()));const json=JSON.parse(new TextDecoder().decode(raw));const cv=document.createElement('canvas');cv.width=128;cv.height=128;cv.style.cssText=sty;ph.replaceWith(cv);lottie.loadAnimation({container:document.createElement('div'),renderer:'canvas',loop:true,autoplay:true,animationData:JSON.parse(JSON.stringify(json)),rendererSettings:{context:cv.getContext('2d'),clearCanvas:true}})}
        catch{const img=document.createElement('img');img.src=url;img.loading='lazy';img.style.cssText=sty;ph.replaceWith(img)}
      }else{const img=document.createElement('img');img.src=url;img.loading='lazy';img.style.cssText=sty;ph.replaceWith(img)}
    }catch(e){console.warn('th#'+i,e)}
  }
}
async function gz(u8){if(typeof DecompressionStream!=='undefined')return new Uint8Array(await new Response(new Blob([u8]).stream().pipeThrough(new DecompressionStream('gzip'))).arrayBuffer());throw Error('浏览器不支持解压')}

/* ===== SELECTION ===== */
function togSel(i){selected.has(i)?selected.delete(i):selected.add(i);document.querySelector('.ce[data-i="'+i+'"]')?.classList.toggle('on',selected.has(i));updSel()}
function selAll(){pack.stickers.forEach((_,i)=>{selected.add(i);document.querySelector('.ce[data-i="'+i+'"]')?.classList.add('on')});updSel()}
function selNone(){selected.clear();document.querySelectorAll('.ce').forEach(e=>e.classList.remove('on'));updSel()}

/* ===== DOWNLOAD CORE ===== */
async function resolveFp(fid,sig){if(pathCache[fid])return pathCache[fid];const r=await apiF(apiU('/getFile?file_id='+fid),sig);const d=await r.json();if(!d.ok)throw Error(d.description||'getFile fail');pathCache[fid]=d.result.file_path;return d.result.file_path}
async function dlBlob(fp,sig){const r=await apiF(fileU(fp),sig);if(!r.ok)throw Error('HTTP '+r.status);return r.blob()}
async function getStk(s,sig){const fp=await resolveFp(s.file_id,sig);const b=await dlBlob(fp,sig);return{blob:b,ext:fp.split('.').pop()||'webp'}}

/* ===== CONVERT ===== */
function w2p(b){return new Promise((y,n)=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');c.width=i.naturalWidth;c.height=i.naturalHeight;c.getContext('2d').drawImage(i,0,0);c.toBlob(r=>{URL.revokeObjectURL(i.src);r?y(r):n(Error('png fail'))},'image/png')};i.onerror=()=>{URL.revokeObjectURL(i.src);n(Error('img fail'))};i.src=URL.createObjectURL(b)})}
async function t2g(b){const raw=await gz(new Uint8Array(await b.arrayBuffer()));const j=JSON.parse(new TextDecoder().decode(raw));const S=256,fps=j.fr||30,tot=(j.op-j.ip)||60,dl=Math.round(1000/fps);const cv=document.createElement('canvas');cv.width=S;cv.height=S;const ctx=cv.getContext('2d');const box=document.getElementById('off');box.innerHTML='';box.appendChild(cv);const a=lottie.loadAnimation({container:document.createElement('div'),renderer:'canvas',loop:false,autoplay:false,animationData:JSON.parse(JSON.stringify(j)),rendererSettings:{context:ctx,clearCanvas:true,preserveAspectRatio:'xMidYMid meet'}});await new Promise(r=>a.addEventListener('DOMLoaded',r));if(!gwBlob)throw Error('GIF Worker未加载，请刷新');const g=new GIF({workers:2,workerScript:URL.createObjectURL(gwBlob),quality:8,width:S,height:S,transparent:0});for(let f=0;f<tot;f++){a.goToAndStop(f,true);await new Promise(r=>requestAnimationFrame(r));const fc=document.createElement('canvas');fc.width=S;fc.height=S;fc.getContext('2d').drawImage(cv,0,0);g.addFrame(fc,{delay:dl,copy:true,dispose:2})}a.destroy();box.innerHTML='';return new Promise((y,n)=>{g.on('finished',y);g.on('error',n);g.render()})}
async function v2g(b){const S=256,u=URL.createObjectURL(b);const v=document.createElement('video');v.muted=true;v.playsInline=true;v.src=u;await new Promise((y,n)=>{v.onloadedmetadata=y;v.onerror=n});const dur=v.duration;if(!dur||!isFinite(dur))throw Error('video fail');const fps=15,tot=Math.min(Math.ceil(dur*fps),150),dl=Math.round(1000/fps);const vw=v.videoWidth||S,vh=v.videoHeight||S,sc=Math.min(S/vw,S/vh),cw=Math.round(vw*sc),ch=Math.round(vh*sc);const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;const ctx=cv.getContext('2d');if(!gwBlob)throw Error('GIF Worker未加载');const g=new GIF({workers:2,workerScript:URL.createObjectURL(gwBlob),quality:10,width:cw,height:ch});for(let f=0;f<tot;f++){v.currentTime=f/tot*dur;await new Promise(r=>{v.onseeked=r});ctx.clearRect(0,0,cw,ch);ctx.drawImage(v,0,0,cw,ch);const fc=document.createElement('canvas');fc.width=cw;fc.height=ch;fc.getContext('2d').drawImage(cv,0,0);g.addFrame(fc,{delay:dl,copy:true})}URL.revokeObjectURL(u);return new Promise((y,n)=>{g.on('finished',y);g.on('error',n);g.render()})}
function vfr(b){return new Promise((y,n)=>{const u=URL.createObjectURL(b),v=document.createElement('video');v.muted=true;v.playsInline=true;v.src=u;v.onloadeddata=()=>{v.currentTime=.01;v.onseeked=()=>{const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);c.toBlob(r=>{URL.revokeObjectURL(u);r?y(r):n(Error('frame fail'))},'image/png')}};v.onerror=()=>{URL.revokeObjectURL(u);n(Error('video fail'))}})}
async function cvt(b,e,f){if(f==='original')return{blob:b,ext:e};if(f==='png'){if(e==='webp')return{blob:await w2p(b),ext:'png'};if(e==='tgs')return{blob:await t2g(b),ext:'gif'};if(e==='webm')return{blob:await vfr(b),ext:'png'};return{blob:b,ext:e}}if(f==='gif'){if(e==='tgs')return{blob:await t2g(b),ext:'gif'};if(e==='webm')return{blob:await v2g(b),ext:'gif'};if(e==='webp')return{blob:await w2p(b),ext:'png'};return{blob:b,ext:e}}return{blob:b,ext:e}}

/* ===== DL UI ===== */
function showDl(){document.getElementById('dlBar').classList.add('show');document.getElementById('btnAll').disabled=true;document.getElementById('btnSel').disabled=true}
function hideDl(){document.getElementById('dlBar').classList.remove('show');document.getElementById('btnAll').disabled=false;document.getElementById('btnSel').disabled=false}
function setRing(p){document.getElementById('rB').style.strokeDashoffset=97.4*(1-p/100);document.getElementById('rP').textContent=Math.round(p)+'%'}
function cancelDl(){if(dlAbort){dlAbort.abort();dlAbort=null}}

/* ===== SINGLE ===== */
async function dlOne(i){
  const s=pack.stickers[i],f=document.getElementById('selFmt').value;
  badge(i,'wk','⟳');
  try{const{blob,ext}=await getStk(s);const r=await cvt(blob,ext,f);saveAs(r.blob,pack.name+'_'+String(i+1).padStart(3,'0')+'.'+r.ext);badge(i,'ok','✓')}
  catch(e){badge(i,'fl','✗');toast('失败：'+e.message,'error')}
  setTimeout(()=>badge(i,''),2500);
}

/* ===== BATCH ===== */
async function dlBatch(idx){
  if(!idx.length)return toast('未选择','warn');
  const fmt=document.getElementById('selFmt').value;
  dlAbort=new AbortController();const sig=dlAbort.signal;
  const total=idx.length;let done=0,fail=0,bytes=0,t0=Date.now();
  showDl();setRing(0);document.getElementById('dT').textContent=`下载中 (0/${total})…`;
  idx.forEach(i=>badge(i,''));
  const results=[];
  for(const i of idx){
    if(sig.aborted)break;
    badge(i,'wk','⟳');
    try{
      document.getElementById('dT').textContent=`下载中 (${done+1}/${total})…`;
      const{blob,ext}=await getStk(pack.stickers[i],sig);
      bytes+=blob.size;
      document.getElementById('dT').textContent=`转换中 (${done+1}/${total})…`;
      const r=await cvt(blob,ext,fmt);
      results.push({i,blob:r.blob,ext:r.ext});
      badge(i,'ok','✓');
    }catch(e){if(e.name==='AbortError')break;badge(i,'fl','✗');fail++;console.warn('#'+(i+1),e.message)}
    done++;setRing(done/total*100);
    const el=(Date.now()-t0)/1000,sp=bytes/1024/Math.max(el,.1);
    document.getElementById('dD').innerHTML=`<span>${done}/${total}</span><span>${sp>1024?(sp/1024).toFixed(1)+' MB/s':Math.round(sp)+' KB/s'}</span>${fail?'<span style="color:var(--red)">'+fail+'失败</span>':''}`;
  }
  if(sig.aborted){hideDl();toast('已取消','warn');return}
  if(!results.length){hideDl();toast('全部失败','error');return}
  document.getElementById('dT').textContent='打包 ZIP…';
  try{
    const zip=new JSZip(),folder=zip.folder(pack.name);
    for(const r of results)folder.file(String(r.i+1).padStart(3,'0')+'_'+(pack.stickers[r.i].emoji||'')+'.'+r.ext,r.blob);
    const zb=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}},m=>{document.getElementById('dT').textContent='打包 '+Math.round(m.percent)+'%';setRing(m.percent)});
    saveAs(zb,pack.name+'.zip');
    let msg=`下载完成！共 ${results.length} 个贴纸（${(bytes/1048576).toFixed(1)} MB）`;if(fail)msg+=`，${fail} 个失败`;toast(msg,'ok');
  }catch(e){toast('ZIP 失败：'+e.message,'error')}
  hideDl();setTimeout(()=>idx.forEach(i=>badge(i,'')),3000);
}
function dlAll(){dlBatch(pack.stickers.map((_,i)=>i))}
function dlSel(){dlBatch([...selected].sort((a,b)=>a-b))}
